name: Generate APK Metadata

on:
  # 1. Trigger automatically when track_repos.txt is updated
  push:
    branches:
      - main
    paths:
      - 'track_repos.txt'
  
  # 2. Allow manual triggers
  workflow_dispatch:

# Add a cron schedule if you want it to check for new app updates every night automatically!
  schedule:
    - cron: '0 4 * * *' # Runs at 4:00 AM UTC every day

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Using 3.12 to avoid f-string backslash errors
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aapt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Generator Script for All Repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Loop through every line in track_repos.txt
          while IFS= read -r repo || [ -n "$repo" ]; do
            # Skip empty lines and comments (lines starting with #)
            if [[ -z "$repo" || "$repo" == \#* ]]; then
              continue
            fi
            
            echo "========================================"
            echo "Processing repository: $repo"
            echo "========================================"
            
            # Run the Python script for this specific repo
            python scripts/main.py --repo "$repo" --release "latest"
            
          done < track_repos.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the new static API directory
          git add website/public/data/
          
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated APK metadata update from track_repos.txt"
          git push