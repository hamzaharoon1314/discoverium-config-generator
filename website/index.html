<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APK Discoverium</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="nav-logo" onclick="goHome()" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="2" width="14" height="20" rx="2"/>
      <path d="M12 18h.01M8 6h8M8 10h8M8 14h4"/>
    </svg>
    Discoverium
  </a>
  <div class="nav-breadcrumb" id="breadcrumb"></div>
</nav>

<main>

  <div class="page active" id="page-home">
    <div class="hero">
      <div class="hero-badge">
        <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="currentColor"/></svg>
        APK Repo Browser
      </div>
      <h1>Browse <span>patched</span> APK repos</h1>
      <p>Explore repositories, view packages, and add apps directly to Obtainium with one click.</p>
    </div>

    <div class="section-header">
      <span class="section-title">// Repositories</span>
      <span class="section-count" id="repo-count">...</span>
    </div>

    <div id="repo-container">
      <div class="loader">
        <div class="spinner"></div>
        <span class="loader-text">fetching repos...</span>
      </div>
    </div>
  </div>

  <div class="page" id="page-repo">
    <div class="repo-header">
      <div class="repo-header-author">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M2 21v-2a7 7 0 0 1 14 0v2"/></svg>
        <span id="repo-author-display"></span>
      </div>
      <h2 class="repo-header-name" id="repo-name-display"></h2>
      <div class="repo-header-stats">
        <div class="stat-pill"><strong id="stat-apps">—</strong> packages</div>
        <div class="stat-pill"><strong id="stat-unique">—</strong> unique apps</div>
        <a id="repo-gh-link" href="#" target="_blank" rel="noopener" class="btn btn-github">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.54 2.87 8.39 6.84 9.75.5.09.68-.22.68-.49 0-.24-.01-1.03-.01-1.87-2.51.56-3.04-1.24-3.23-1.58-.39-.66-.86-.83-1.18-.98-.31-.17-.79-.56-.01-.57.74-.01 1.26.69 1.44 1 .84 1.43 2.18.99 2.71.76.08-.59.33-.99.6-1.22-2.08-.24-4.25-1.06-4.25-4.71 0-1.04.36-1.89.96-2.56-.1-.24-.42-1.21.09-2.52 0 0 .79-.26 2.59 1 .75-.21 1.55-.32 2.35-.32.8 0 1.6.11 2.35.32 1.8-1.27 2.59-1 2.59-1 .51 1.31.19 2.28.09 2.52.6.67.96 1.52.96 2.56 0 3.66-2.18 4.47-4.26 4.71.34.29.63.86.63 1.74 0 1.26-.01 2.27-.01 2.59 0 .27.18.58.69.49A10.28 10.28 0 0 0 22 12.26C22 6.58 17.52 2 12 2z"/></svg>
          GitHub
        </a>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input type="search" id="search-input" placeholder="Search by app name or package ID..." oninput="filterApps()">
    </div>

    <div class="filter-row" id="filter-chips"></div>

    <div class="section-header">
      <span class="section-title">// Packages</span>
      <span class="section-count" id="app-count">...</span>
    </div>

    <div id="app-container">
      <div class="loader">
        <div class="spinner"></div>
        <span class="loader-text">loading packages...</span>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toast-msg">Copied!</span>
</div>

<script src="app.js"></script>

</body>
</html>
